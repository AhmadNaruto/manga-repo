name: Build Single Extension

on:
  workflow_dispatch:
    inputs:
      extension_path:
        description: 'Extension path (e.g., :src:id:westmanga:assembleRelease)'
        required: true
        type: string
        default: ':src:id:westmanga:assembleRelease'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Prepare signing key
        if: github.event_name != 'pull_request'
        run: |
          echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Build extension
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew ${{ inputs.extension_path }}

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: extension-apk
          path: "**/*.apk"
          retention-days: 7

      - name: Clean up CI files
        run: rm -f signingkey.jks
