name: Auto cherry-pick Keiyoushi

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
    - cron: "0 20 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: # Manual dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  auto-merge:
    name: Auto cherry-pick Keiyoushi
    if: github.repository == 'yuzono/tachiyomi-extensions'
    runs-on: ubuntu-latest

    steps:
      - name: Clone master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          path: master
          fetch-depth: 100
          token: ${{ secrets.BOT_PAT }}

      - name: Sync keiyoushi with upstream
        run: |
          cd master

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git fetch origin keiyoushi
          git checkout keiyoushi
          echo "Last commit: $(git log -1 --oneline)"
          git remote add keiyoushi-upstream https://github.com/keiyoushi/extensions-source
          git fetch keiyoushi-upstream
          echo "Upstream commit: $(git log -1 --oneline keiyoushi-upstream/main)"

          echo "Incoming commits:"
          echo "$(git log keiyoushi..keiyoushi-upstream/main --oneline)"
          
          # Check if there are new commits
          if [ -z "$(git log keiyoushi..keiyoushi-upstream/main --oneline)" ]; then
            echo "No new commits from upstream, skipping sync"
            exit 0
          fi

          # Rebase keiyoushi on top of upstream/main
          echo "Rebasing keiyoushi onto upstream/main..."
          git rebase keiyoushi-upstream/main || {
            echo "Rebase conflict detected, aborting..."
            git rebase --abort || true
            exit 1
          }

          echo "Rebase successful!"
          echo "Last commit: $(git log -1 --oneline)"

          # Force push keiyoushi
          echo "Pushing keiyoushi branch..."
          git push --force-with-lease origin keiyoushi || {
            echo "Push failed, continuing..."
          }

      # - name: Merging master to merge-keiyoushi
      #   run: |
      #     cd master
      #     git fetch origin merge-keiyoushi
      #     git checkout merge-keiyoushi
      #     echo "Last commit: `git log -1 --oneline`"
      #     echo "Merging 'master' into merge-keiyoushi"
      #     git merge --no-edit master
      #     echo "Last commit: `git log -1 --oneline`"

      # - name: Merging keiyoushi-upstream to merge-keiyoushi
      #   run: |
      #     cd master
      #     echo "Merging 'keiyoushi-upstream/main' into merge-keiyoushi"
      #     git merge --no-edit keiyoushi-upstream/main
      #     echo "Last commit: `git log -1 --oneline`"

      - name: Pushing to repo
        run: |
          cd master
          git checkout master
          echo "Last commit: $(git log -1 --oneline)"
          echo "Pushing 'master' to repo"
          git push --force-with-lease origin master || echo "Push master failed, continuing..."
          # git checkout merge-keiyoushi
          # echo "Last commit: $(git log -1 --oneline)"
          # echo "Pushing 'merge-keiyoushi' to repo"
          # git push
